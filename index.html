  </head>

  <body>
    <div class="dashboard-wrapper">
      <div class="events-dashboard">
        <div class="event-cards-row">
          <div
            class="event-card event-item glass-panel not-ready"
            id="card-parasha-wrapper"
            tabindex="0"
            role="button"
            aria-label="Detalhes do Ciclo Anual"
          >
            <div class="icon-circle cicloanual">
              <i class="fa-solid fa-book-open"></i>
            </div>
            <div class="card-content" style="width: 100%;">
              <h2 class="card-title" id="card-parasha"><span class="skeleton-line" style="display: inline-block; width: 80%; height: 24px; border-radius: 6px;"></span></h2>
              <span class="card-subtitle" id="card-parasha-subtitle"
                ><span class="skeleton-line" style="display: inline-block; width: 40%; height: 16px; border-radius: 4px; margin-top: 4px;"></span></span
              >
            </div>
          </div>

          <div
            class="event-card event-item glass-panel not-ready"
            id="card-torah-wrapper"
            tabindex="0"
            role="button"
            aria-label="Ler Lei Escrita"
          >
            <div class="icon-circle leiescrita">
              <i class="fa-solid fa-scroll"></i>
            </div>
            <div class="card-content" style="width: 100%;">
              <h2 class="card-title" id="card-torah"><span class="skeleton-line" style="display: inline-block; width: 60%; height: 24px; border-radius: 6px;"></span></h2>
              <span class="card-subtitle"><span class="skeleton-line" style="display: inline-block; width: 45%; height: 16px; border-radius: 4px; margin-top: 4px;"></span></span>
            </div>
          </div>

          <div
            class="event-card event-item glass-panel not-ready"
            id="card-haftara-wrapper"
            tabindex="0"
            role="button"
            aria-label="Ler Olhar Futuro"
          >
            <div class="icon-circle profetas">
              <i class="fa-solid fa-feather-pointed"></i>
            </div>
            <div class="card-content" style="width: 100%;">
              <h2 class="card-title" id="card-haftara"><span class="skeleton-line" style="display: inline-block; width: 70%; height: 24px; border-radius: 6px;"></span></h2>
              <span class="card-subtitle"><span class="skeleton-line" style="display: inline-block; width: 50%; height: 16px; border-radius: 4px; margin-top: 4px;"></span></span>
            </div>
          </div>

          <div
            class="event-card event-item glass-panel not-ready"
            id="card-ketuvim-wrapper"
            tabindex="0"
            role="button"
            aria-label="Ler Escrito Sagrado"
          >
            <div class="icon-circle ketuvim">
              <i class="fa-solid fa-pen-nib"></i>
            </div>
            <div class="card-content" style="width: 100%;">
              <h2 class="card-title" id="card-ketuvim"><span class="skeleton-line" style="display: inline-block; width: 65%; height: 24px; border-radius: 6px;"></span></h2>
              <span class="card-subtitle"><span class="skeleton-line" style="display: inline-block; width: 55%; height: 16px; border-radius: 4px; margin-top: 4px;"></span></span>
            </div>
          </div>
        </div>

        <div
          id="upcoming-events-grid"
          class="event-cards-row upcoming-events-grid"
        >
          <div class="event-card event-item glass-panel not-ready" tabindex="0" role="button">
            <div class="icon-circle localvigente">
              <i class="fa-solid fa-star"></i>
            </div>
            <div class="card-content" style="width: 100%;">
              <h2 class="card-title"><span class="skeleton-line" style="display: inline-block; width: 60%; height: 24px; border-radius: 6px;"></span></h2>
              <span class="card-subtitle"><span class="skeleton-line" style="display: inline-block; width: 40%; height: 16px; border-radius: 4px; margin-top: 4px;"></span></span>
            </div>
          </div>
          <div class="event-card event-item glass-panel not-ready" tabindex="0" role="button">
            <div class="icon-circle datahebraica">
              <i class="fa-solid fa-star"></i>
            </div>
            <div class="card-content" style="width: 100%;">
              <h2 class="card-title"><span class="skeleton-line" style="display: inline-block; width: 75%; height: 24px; border-radius: 6px;"></span></h2>
              <span class="card-subtitle"><span class="skeleton-line" style="display: inline-block; width: 50%; height: 16px; border-radius: 4px; margin-top: 4px;"></span></span>
            </div>
          </div>
          <div class="event-card event-item glass-panel not-ready" tabindex="0" role="button">
            <div class="icon-circle parashat">
              <i class="fa-solid fa-star"></i>
            </div>
            <div class="card-content" style="width: 100%;">
              <h2 class="card-title"><span class="skeleton-line" style="display: inline-block; width: 50%; height: 24px; border-radius: 6px;"></span></h2>
              <span class="card-subtitle"><span class="skeleton-line" style="display: inline-block; width: 35%; height: 16px; border-radius: 4px; margin-top: 4px;"></span></span>
            </div>
          </div>
          <div class="event-card event-item glass-panel not-ready" tabindex="0" role="button">
            <div class="icon-circle roshchodesh">
              <i class="fa-solid fa-star"></i>
            </div>
            <div class="card-content" style="width: 100%;">
              <h2 class="card-title"><span class="skeleton-line" style="display: inline-block; width: 80%; height: 24px; border-radius: 6px;"></span></h2>
              <span class="card-subtitle"><span class="skeleton-line" style="display: inline-block; width: 45%; height: 16px; border-radius: 4px; margin-top: 4px;"></span></span>
            </div>
          </div>
        </div>

        <div class="event-cards-row">
          <!-- ID added to identify card for modal trigger -->
          <div
            class="event-card event-item glass-panel not-ready"
            id="card-local-vigente"
            tabindex="0"
            role="button"
            aria-label="Alterar localização"
          >
            <div class="icon-circle localvigente">
              <i class="fa-solid fa-location-dot"></i>
            </div>
            <div class="card-content" style="width: 100%;">
              <h2 class="card-title" id="card-local"><span class="skeleton-line" style="display: inline-block; width: 85%; height: 24px; border-radius: 6px;"></span></h2>
              <span class="card-subtitle"><span class="skeleton-line" style="display: inline-block; width: 40%; height: 16px; border-radius: 4px; margin-top: 4px;"></span></span>
            </div>
          </div>

          <div
            class="event-card event-item glass-panel not-ready"
            id="card-hdate-wrapper"
            tabindex="0"
            role="button"
            aria-label="Detalhes da Data Hebraica"
          >
            <div class="icon-circle datahebraica">
              <i class="fa-solid fa-calendar-days"></i>
            </div>
            <div class="card-content" style="width: 100%;">
              <h2 class="card-title" id="card-hdate"><span class="skeleton-line" style="display: inline-block; width: 75%; height: 24px; border-radius: 6px;"></span></h2>
              <span class="card-subtitle"><span class="skeleton-line" style="display: inline-block; width: 45%; height: 16px; border-radius: 4px; margin-top: 4px;"></span></span>
            </div>
          </div>

          <div
            class="event-card event-item glass-panel not-ready info-trigger"
            id="card-zmanim-wrapper"
            tabindex="0"
            role="button"
            aria-label="Ver Zmanim"
          >
            <div class="icon-circle zmanim">
              <i class="fa-solid fa-clock"></i>
            </div>
            <div class="card-content" style="width: 100%;">
              <h2 class="card-title" id="card-zmanim"><span class="skeleton-line" style="display: inline-block; width: 65%; height: 24px; border-radius: 6px;"></span></h2>
              <span class="card-subtitle"><span class="skeleton-line" style="display: inline-block; width: 45%; height: 16px; border-radius: 4px; margin-top: 4px;"></span></span>
            </div>
          </div>

          <div
            class="event-card event-item glass-panel not-ready"
            id="card-share-wrapper"
            tabindex="0"
            role="button"
            aria-label="Partilhar aplicativo"
          >
            <div class="icon-circle share">
              <i class="fa-solid fa-share-nodes"></i>
            </div>
            <div class="card-content" style="width: 100%;">
              <h2 class="card-title" id="card-share"><span class="skeleton-line" style="display: inline-block; width: 70%; height: 24px; border-radius: 6px;"></span></h2>
              <span class="card-subtitle"><span class="skeleton-line" style="display: inline-block; width: 55%; height: 16px; border-radius: 4px; margin-top: 4px;"></span></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Location Privacy Modal -->
    <div id="location-modal" class="modal-overlay" style="display: none">
      <div class="modal-content glass-panel reading-modal-content">
        <div class="search-container">
          <input
            type="text"
            id="location-search-input"
            class="modal-input"
            placeholder="Pesquisar cidade..."
            autocomplete="off"
            aria-label="Pesquisar cidade"
            style="
              font-size: 1.1rem;
              font-weight: 500;
              color: var(--text-primary);
              margin: 0;
              letter-spacing: 0.5px;
            "
          />
          <i id="search-spinner" class="fa-solid fa-circle-notch fa-spin"></i>
          <button
            id="close-location-btn"
            class="modal-close-btn"
            aria-label="Fechar"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="reading-body">
          <ul id="location-suggestions" class="suggestions-list">
            <li style="opacity: 0.1; pointer-events: none">-</li>
            <li style="opacity: 0.1; pointer-events: none">-</li>
            <li style="opacity: 0.1; pointer-events: none">-</li>
            <li style="opacity: 0.1; pointer-events: none">-</li>
            <li style="opacity: 0.1; pointer-events: none">-</li>
            <li style="opacity: 0.1; pointer-events: none">-</li>
            <li style="opacity: 0.1; pointer-events: none">-</li>
            <li style="opacity: 0.1; pointer-events: none">-</li>
            <li style="opacity: 0.1; pointer-events: none">-</li>
            <li style="opacity: 0.1; pointer-events: none">-</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Scripture Reading Modal -->
    <div id="reading-modal" class="modal-overlay" style="display: none">
      <div class="modal-content glass-panel reading-modal-content">
        <div class="reading-header">
          <h2 id="reading-modal-title" class="reading-title">-</h2>
          <button
            id="close-reading-btn"
            class="modal-close-btn"
            aria-label="Fechar"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div id="reading-modal-body" class="reading-body">
          <!-- Populated dynamically -->
        </div>
      </div>
    </div>

    <!-- Info Modal -->
    <div id="info-modal" class="modal-overlay" style="display: none">
      <div class="modal-content glass-panel reading-modal-content">
        <div class="reading-header">
          <h2 id="info-modal-title" class="reading-title">-</h2>
          <button
            id="close-info-btn"
            class="modal-close-btn"
            aria-label="Fechar"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div id="info-modal-body" class="reading-body">
          <!-- Populated dynamically -->
        </div>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
