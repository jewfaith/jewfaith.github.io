<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YisraelDate</title>
    <link
      rel="shortcut icon"
      href="https://dwo.co.il/wp-content/uploads/2022/03/Emblem_of_Israel.svg_.png"
      type="image/svg+xml"
    />
    
    <!-- Otimizações de Conexão (DNS/TLS) para as APIs críticas -->
    <link rel="preconnect" href="https://www.hebcal.com" crossorigin />
    <link rel="preconnect" href="https://nominatim.openstreetmap.org" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="icons.js"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#05060b">
  </head>

  <body>
    <div class="dashboard-wrapper">
      <div class="events-dashboard">
        <div class="event-cards-row">
          <div class="event-card event-item glass-panel">
            <div class="icon-circle cicloanual">
              <i class="fa-solid fa-book-open"></i>
            </div>
            <div class="card-content">
              <h2 class="card-title" id="card-parasha">-</h2>
              <span class="card-subtitle" id="card-parasha-subtitle">Ciclo Anual</span>
            </div>
          </div>

          <div class="event-card event-item glass-panel">
            <div class="icon-circle leiescrita">
              <i class="fa-solid fa-scroll"></i>
            </div>
            <div class="card-content">
              <h2 class="card-title" id="card-torah">-</h2>
              <span class="card-subtitle">Lei Escrita</span>
            </div>
          </div>

          <div class="event-card event-item glass-panel">
            <div class="icon-circle profetas">
              <i class="fa-solid fa-feather-pointed"></i>
            </div>
            <div class="card-content">
              <h2 class="card-title" id="card-haftara">-</h2>
              <span class="card-subtitle">Olhar Futuro</span>
            </div>
          </div>

          <div class="event-card event-item glass-panel">
            <div class="icon-circle ketuvim">
              <i class="fa-solid fa-pen-nib"></i>
            </div>
            <div class="card-content">
              <h2 class="card-title" id="card-ketuvim">-</h2>
              <span class="card-subtitle">Escrito Sagrado</span>
            </div>
          </div>
        </div>

        <div
          id="upcoming-events-grid"
          class="event-cards-row upcoming-events-grid"
        ></div>

        <div class="event-cards-row">
          <!-- ID added to identify card for modal trigger -->
          <div
            class="event-card event-item glass-panel not-ready"
            id="card-local-vigente"
            tabindex="0"
            role="button"
            aria-label="Alterar localização"
          >
            <div class="icon-circle localvigente">
              <i class="fa-solid fa-location-dot"></i>
            </div>
            <div class="card-content">
              <h2 class="card-title" id="card-local">-</h2>
              <span class="card-subtitle">Local Vigente</span>
            </div>
          </div>

          <div 
            class="event-card event-item glass-panel not-ready" 
            id="card-hdate-wrapper"
          >
            <div class="icon-circle datahebraica">
              <i class="fa-solid fa-calendar-week"></i>
            </div>
            <div class="card-content">
              <h2 class="card-title" id="card-hdate">-</h2>
              <span class="card-subtitle">Data Hebraica</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Location Privacy Modal -->
    <div id="location-modal" class="modal-overlay" style="display: none">
      <div class="modal-content glass-panel" style="position: relative">
        <div class="search-container" style="position: relative; ">
          <input
            type="text"
            id="location-search-input"
            class="modal-input"
            placeholder="Digite uma cidade ou país..."
            autocomplete="off"
          />
          <i id="search-spinner" class="fa-solid fa-circle-notch fa-spin" style="position: absolute; right: 15px; top: 15px; color: #94a3b8; display: none;"></i>
          <ul
            id="location-suggestions"
            class="suggestions-list"
            style="display: block"
          >
            <li style="opacity: 0.2; pointer-events: none">-</li>
            <li style="opacity: 0.2; pointer-events: none">-</li>
            <li style="opacity: 0.2; pointer-events: none">-</li>
          </ul>
        </div>
      </div>
    </div>


    <script src="script.js"></script>
  </body>
</html>
